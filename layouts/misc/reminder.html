{{ define "header" }}
<code>Layout: misc/reminder.html</code>
<header class="header">
  <h1 class="hidden-title-seo">{{ .Params.titleSEO}}</h1>
  {{ with .Params.kicker }}
  <span>{{.}}</span>
  {{ end }}
  <h2>{{ .Title }}</h2>
  {{ with .Params.subtitle }}
  <span class="subtitle">{{.}}</span>
  {{ end }}
</header>
{{ end }} 



{{ define "main" }}
<main aria-role="main">

  <div class="main-content">
    <!-- Note that the content for index.html, as a sort of list page, will pull from content/_index.md -->
    {{.Content}}
  </div>

</main>

{{ end }}
