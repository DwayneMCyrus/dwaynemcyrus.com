{{ define "header" }}
<code class="layout-text">Layout: misc/verify.html</code>
<header class="header">
  <h1 class="hidden-title-seo">{{ .Params.titleSEO}}</h1>
</header>
{{ end }} 



{{ define "main" }}
<main aria-role="main">
  <div class="reminder">
  {{ with .Params.kicker }}
  <p class="kicker">{{.}}</p>
  {{ end }}
  <h3>{{.Title}}</h3>
  {{ with .Params.subtitle }}
  <p class="subtitle">{{.}}</p>
  {{ end }}
  <div>
    {{.Content}}
    </div>

  </div>
</main>
{{ end }}
