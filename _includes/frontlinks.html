<aside style="font-size: 0.9em">
    <h3 style="margin-bottom: 1em">Notes linked from this note</h3>
    {% if page.frontlinks and page.frontlinks.size > 0 %}
    <div style="display: grid; grid-gap: 1em; grid-template-columns: repeat(1fr);">
      {% for frontlink in page.frontlinks %}
        <div class="frontlink-box">
          <a class="internal-link" href="{{ site.baseurl }}{{ frontlink.url }}{%- if site.use_html_extension -%}.html{%- endif -%}">
            {{ frontlink.title }}
          </a><br>
          <div style="font-size: 0.9em">{{ frontlink.excerpt | strip_html | truncatewords: 20 }}</div>
        </div>
      {% endfor %}
    </div>
    {% else %}
    <div style="font-size: 0.9em">
      <p>There's no outgoing link in this document.</p>
    </div>
    {% endif %}
  </aside>
