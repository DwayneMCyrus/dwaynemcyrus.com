include:             ['_pages']
exclude:             ['_includes/notes_graph.json']

collections:
  authors:
    output: true
  notes:
    output: true
    permalink: /:slug

defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag